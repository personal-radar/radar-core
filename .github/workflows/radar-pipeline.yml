name: 📡 Daily Intelligence Radar & Web Publish

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  pages: write      # GitHub Pages için yetki
  id-token: write   # OIDC doğrulaması için

jobs:
  harvest-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Repoyu Klonla
        uses: actions/checkout@v4

      - name: 🦀 Rust Kurulumu
        uses: actions-rust-lang/setup-rust-toolchain@v1

      # 1. Aşama: Veriyi Çek ve Sentezle
      - name: 🚀 Radarı Çalıştır (Veri Hasadı)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: cargo run --release --bin radar

      # 2. Aşama: Günü Tarihle ve Issue Aç
      - name: 📝 Günü Tarihle
        id: date
        run: echo "TODAY=$(date +'%d %B %Y')" >> $GITHUB_ENV

      - name: 📭 Issue Olarak Yayınla
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "📅 Radar Bülteni: $TODAY" \
            --body-file daily_radar.md

      # 3. Aşama: Web Sitesini Oluştur
      - name: 🌐 Web Sitesini Üret
        run: cargo run --release --bin web_builder

      # 4. Aşama: GitHub Pages'e Yükle
      - name: 📤 GitHub Pages Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  # 5. Aşama: GitHub Pages Deployment Job
  deploy-pages:
    needs: harvest-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4